name: Atlas V3 Release Gate

on:
  pull_request:
    branches:
      - atlas-v3-build
      - main
  push:
    branches:
      - atlas-v3-auth
      - atlas-v3-build

concurrency:
  group: atlas-v3-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: TypeScript
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck-errors.txt

      - name: ESLint
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint-errors.txt

      - name: Production build
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build-errors.txt

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-validation-diagnostics
          path: |
            typecheck-errors.txt
            lint-errors.txt
            build-errors.txt
          if-no-files-found: warn

      - name: Enforce release gate
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.typecheck.outcome }}" != "success" || "${{ steps.lint.outcome }}" != "success" || "${{ steps.build.outcome }}" != "success" ]]; then
            echo "Atlas V3 release gate failed. Review the diagnostics artifact."
            exit 1
          fi
