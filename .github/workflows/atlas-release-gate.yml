name: Atlas V3 Release Gate

on:
  pull_request:
    branches:
      - atlas-v3-build
      - main
  push:
    branches:
      - atlas-v3-auth
      - atlas-v3-build

concurrency:
  group: atlas-v3-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Enterprise architecture check
        run: npm run enterprise:check

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint-errors.txt

      - name: Upload lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-level6-lint-diagnostics
          path: lint-errors.txt
          if-no-files-found: error

      - name: Fail on lint errors
        if: steps.lint.outcome != 'success'
        run: exit 1

      - name: Production build
        run: npm run build
