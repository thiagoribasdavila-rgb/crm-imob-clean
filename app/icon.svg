<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Favicon: SÓ a estrela-guia. A órbita e o planeta ficaram de fora de propósito.
    Num favicon o alvo real é 16px: ali o traço da órbita (1.3 numa caixa de 100) mede
    0,2px e o planeta menos de 1px — não viram detalhe, viram sujeira cinza em volta da
    marca. A estrela sozinha é o que o olho reconhece nesse tamanho.

    Enquadramento calculado, não tentado: a estrela ocupa x 16→84 e y 4→96 na caixa de
    100. Com escala s, centralizá-la exige translate = 32 - 50s nos dois eixos. Com
    s = 0.48 ela fica 32,6 × 44,2 numa arte de 64 — cerca de 69% da altura, proporção em
    que uma marca vertical respira dentro do quadrado sem encostar nas bordas. A versão
    anterior usava s = 0.54 com translate 5, o que só é centrado por acaso e deixava a
    estrela deslocada para cima.
  -->
  <defs>
    <linearGradient id="atlasIconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3ae7d7"/>
      <stop offset="1" stop-color="#8b8cff"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#06080f"/>
  <g transform="translate(8 8) scale(0.48)">
    <path d="M50,4 Q55.5,44.5 84,50 Q55.5,55.5 50,96 Q44.5,55.5 16,50 Q44.5,44.5 50,4 Z" fill="url(#atlasIconGrad)"/>
  </g>
</svg>
